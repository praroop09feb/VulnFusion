[phases.setup]
nixPkgs = ["python3", "perl", "wget", "unzip", "git"]

[phases.install]
cmds = [
  "npm install --ignore-scripts",
  "mkdir -p bin",
  # Download Linux nuclei binary
  "wget -q https://github.com/projectdiscovery/nuclei/releases/download/v3.3.10/nuclei_3.3.10_linux_amd64.zip -O /tmp/nuclei.zip && unzip -o /tmp/nuclei.zip -d /tmp/nuclei_out && mv /tmp/nuclei_out/nuclei bin/nuclei && chmod +x bin/nuclei",
  # Download Linux subfinder binary
  "wget -q https://github.com/projectdiscovery/subfinder/releases/download/v2.6.7/subfinder_2.6.7_linux_amd64.zip -O /tmp/subfinder.zip && unzip -o /tmp/subfinder.zip -d /tmp/sfout && mv /tmp/sfout/subfinder bin/subfinder && chmod +x bin/subfinder",
  # Update Nuclei Templates during build
  "./bin/nuclei -ut",
  # Install SQLMap
  "git clone --depth 1 https://github.com/sqlmapproject/sqlmap.git bin/sqlmap-dir",
  # Install Nikto
  "git clone --depth 1 https://github.com/sullo/nikto.git bin/nikto-dir",
  # Install XSStrike Python dependencies
  "pip3 install -r bin/xsstrike/requirements.txt || echo 'XSStrike requirements failed, skipping'"
]

[phases.build]
cmds = [
  "npx prisma generate",
  "npx prisma db push",
  "npm run build"
]

[start]
cmd = "node scanner-worker.js"

[variables]
DATABASE_URL = "file:./dev.db"
NODE_ENV = "production"
PATH = "$PATH:$(pwd)/bin"
